name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check app/

      - name: Format check
        run: ruff format --check app/

      - name: Test
        run: pytest --tb=short -q

      - name: Security audit
        run: pip-audit -r requirements.txt

  deploy:
    needs: check
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/218784664685/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nikkoe-ci-deployer@valid-cedar-492118-d6.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nikkoe-backend \
            --source . \
            --region us-central1 \
            --clear-base-image \
            --quiet
