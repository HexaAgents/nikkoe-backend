name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install ruff

      - name: Lint
        run: ruff check app/ tests/

      - name: Format check
        run: ruff format --check app/ tests/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Unit tests
        run: pytest --tb=short -q

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install pip-audit

      - name: Dependency audit
        run: pip-audit -r requirements.txt

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t nikkoe-backend:ci .

  migrations:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate migration files
        run: |
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found — skipping"
            exit 0
          fi
          errors=0
          for f in "${files[@]}"; do
            name=$(basename "$f")
            if [[ ! "$name" =~ ^[0-9]{8} ]]; then
              echo "ERROR: $name does not start with a date (YYYYMMDD)"
              errors=1
            fi
            if [ ! -s "$f" ]; then
              echo "ERROR: $name is empty"
              errors=1
            else
              echo "OK: $name ($(wc -c < "$f") bytes)"
            fi
          done
          exit $errors

  deploy:
    needs: [lint, test, security, build, migrations]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/218784664685/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: nikkoe-ci-deployer@valid-cedar-492118-d6.iam.gserviceaccount.com

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy nikkoe-backend \
            --source . \
            --region us-central1 \
            --clear-base-image \
            --quiet

      - name: Post-deploy health check
        run: |
          SERVICE_URL=$(gcloud run services describe nikkoe-backend \
            --region us-central1 \
            --format 'value(status.url)')
          echo "Checking $SERVICE_URL/api/health ..."
          for attempt in 1 2 3 4 5; do
            status=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/api/health" || true)
            if [ "$status" = "200" ]; then
              echo "Health check passed on attempt $attempt"
              exit 0
            fi
            echo "Attempt $attempt: HTTP $status — retrying in 10s"
            sleep 10
          done
          echo "Health check failed after 5 attempts"
          exit 1
